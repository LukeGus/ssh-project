[daemon]
# Specify the bind address (default: listen on all interfaces)
# Replace 0.0.0.0 with a specific IP if you want to restrict the interface.
bind_host = 0.0.0.0

# Specify the port for GuacD to listen on (default: 4822)
bind_port = 4822

[logging]
# Logging level: error, warning, info, or debug (default: info)
level = info

# Log file location (optional, logs to stdout if not specified)
# log_file = /backend/guacd.log

[ssl]
# Uncomment and configure if you want GuacD to use SSL
# server_certificate = /backend/ssl/server.crt
# server_key = /backend/ssl/server.key